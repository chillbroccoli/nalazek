  <!-- Horizontal stripe cuts – decorative brand detail -->
  <rect x="9" y="19" width="42" height="3" fill="#ffffff" fill-opacity="0.28"/>
  <rect x="9" y="30" width="42" height="3" fill="#ffffff" fill-opacity="0.28"/>
  <rect x="9" y="41" width="42" height="3" fill="#ffffff" fill-opacity="0.28"/>
